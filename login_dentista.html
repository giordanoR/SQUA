<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - DentalSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(-45deg, #0f4c75, #3282b8, #bbe1fa, #ffffff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-icon {
            font-size: 3rem;
            color: #0f4c75;
            background: #bbe1fa;
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            box-shadow: 0 5px 15px rgba(50, 130, 184, 0.4);
        }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #ced4da; }
        .form-control:focus { box-shadow: 0 0 0 0.25rem rgba(15, 76, 117, 0.25); border-color: #3282b8; }
        .btn-login-custom {
            background-color: #0f4c75;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-login-custom:hover { background-color: #3282b8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(15, 76, 117, 0.4); color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-tooth"></i></div>
        <h3 class="fw-bold mb-1" style="color: #0f4c75;">DentalSys</h3>
        <p class="text-muted mb-4">Ingrese sus credenciales para continuar</p>
        
        <form>
            <div class="input-group mb-3">
                <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px;"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" id="correo" class="form-control border-start-0" placeholder="Correo electrónico" required style="border-radius: 0 10px 10px 0;">
            </div>
            
            <div class="input-group mb-4">
                <span class="input-group-text bg-white border-end-0" style="border-radius: 10px 0 0 10px;"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" id="password" class="form-control border-start-0" placeholder="Contraseña" required style="border-radius: 0 10px 10px 0;">
            </div>
            
            <button type="button" id="btn-login" class="btn btn-login-custom w-100 mb-3" onclick="validarLogin()">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>
            <a href="#" class="text-decoration-none text-muted small">¿Olvidó su contraseña?</a>
        </form>
    </div>

    <script>
        function validarLogin() {
            let user = document.getElementById('correo').value;
            let pass = document.getElementById('password').value;
            if(user === "doctora@dentalsys.com" && pass === "DocDental2026*") {
                window.location.href = "dashboard_doctora.html";
            } else if(user === "asistente@dentalsys.com" && pass === "AsisDental2026*") {
                window.location.href = "dashboard_asistente.html";
            } else {
                alert("Credenciales incorrectas");
            }
        }
    </script>
</body>
</html>
