<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Consultorio Dental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-4">Iniciar Sesión</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" id="btn-login" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let email = document.getElementById('correo').value;
            if(email === "doctora@dentalsys.com") {
                window.location.href = "dashboard_doctora.html";
            } else if(email === "asistente@dentalsys.com") {
                window.location.href = "dashboard_asistente.html";
            } else {
                alert("Credenciales incorrectas");
            }
        });
    </script>
</body>
</html>
