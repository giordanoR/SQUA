<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Médico Senior - Dra. Rojas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #0f4c75; --secondary-blue: #3282b8; --accent-cyan: #bbe1fa; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background-color: var(--primary-dark); color: white; width: 280px; }
        .sidebar a { color: var(--accent-cyan); text-decoration: none; padding: 12px 20px; display: block; border-radius: 8px; margin: 5px 10px; cursor: pointer; }
        .sidebar a.active { background-color: var(--secondary-blue); color: white; }
        .seccion-modulo { display: none; }
        .seccion-activa { display: block; }
    </style>
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar shadow p-3">
            <h4 class="text-center mb-4"><i class="fas fa-user-md"></i> Portal Médico</h4>
            <a onclick="cambiarModulo('citas', this)" class="active"><i class="fas fa-calendar-check me-2"></i> Gestión de Pacientes</a>
            <a onclick="cambiarModulo('horarios', this)"><i class="fas fa-clock me-2"></i> Mis Horarios</a>
            <a href="login_dentista.html" class="text-white bg-danger mt-5"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </nav>

        <div class="flex-grow-1 p-4">
            <h2 id="titulo-pantalla" class="fw-bold text-primary">Gestión de Pacientes</h2>
            
            <div id="modulo-citas" class="seccion-modulo seccion-activa">
                <div class="card shadow border-0 p-4">
                    <div class="d-flex justify-content-between mb-3">
                        <h5>Base de Datos de Pacientes</h5>
                        <button class="btn btn-primary btn-sm" onclick="abrirModalNuevo()">+ Nuevo Paciente</button>
                    </div>
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>CI</th>
                                <th>Nombre</th>
                                <th>Motivo</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-pacientes">
                            <tr id="fila-1">
                                <td>1029384</td>
                                <td><strong>Marcos Benítez</strong></td>
                                <td><span class="badge bg-info text-dark">Limpieza</span></td>
                                <td><span class="badge bg-warning">Pendiente</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-warning" onclick="editarPaciente(1, '1029384', 'Marcos Benítez', 'Limpieza')"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="modulo-horarios" class="seccion-modulo">
                <div class="card p-5 text-center shadow">
                    <i class="fas fa-calendar-alt fa-4x text-primary mb-3"></i>
                    <h4>Configuración de Turnos Habilitada</h4>
                    <p>Dra. Rojas, sus horarios están sincronizados con la recepción.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPaciente" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitulo">Registrar Paciente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formDoc">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3"><label>CI</label><input type="text" id="ci" class="form-control"></div>
                        <div class="mb-3"><label>Nombre</label><input type="text" id="nombre" class="form-control"></div>
                        <div class="mb-3">
                            <label>Motivo</label>
                            <select id="motivo" class="form-select">
                                <option>Revisión</option>
                                <option>Limpieza</option>
                                <option>Extracción</option>
                                <option>Lavación Profunda</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="guardarCambiosDoc()">Guardar Paciente</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function cambiarModulo(id, el) {
            document.querySelectorAll('.seccion-modulo').forEach(s => s.classList.remove('seccion-activa'));
            document.getElementById('modulo-'+id).classList.add('seccion-activa');
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
        }

        function abrirModalNuevo() {
            document.getElementById('formDoc').reset();
            document.getElementById('modalTitulo').innerText = "Nuevo Paciente";
            document.getElementById('edit-id').value = "";
            new bootstrap.Modal(document.getElementById('modalPaciente')).show();
        }

        function editarPaciente(id, ci, nom, mot) {
            document.getElementById('modalTitulo').innerText = "Editar Paciente";
            document.getElementById('edit-id').value = id;
            document.getElementById('ci').value = ci;
            document.getElementById('nombre').value = nom;
            document.getElementById('motivo').value = mot;
            new bootstrap.Modal(document.getElementById('modalPaciente')).show();
        }

        function guardarCambiosDoc() {
            let id = document.getElementById('edit-id').value;
            let ci = document.getElementById('ci').value;
            let nom = document.getElementById('nombre').value;
            let mot = document.getElementById('motivo').value;

            if(id === "") { // Nuevo
                let newId = Date.now();
                let fila = `<tr id="fila-${newId}"><td>${ci}</td><td><strong>${nom}</strong></td><td><span class="badge bg-info text-dark">${mot}</span></td><td><span class="badge bg-success">Nuevo</span></td><td><button class="btn btn-sm btn-outline-warning" onclick="editarPaciente('${newId}', '${ci}', '${nom}', '${mot}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="fas fa-trash"></i></button></td></tr>`;
                document.getElementById('tabla-pacientes').innerHTML += fila;
            } else { // Editar
                let fila = document.getElementById('fila-'+id);
                fila.cells[0].innerText = ci;
                fila.cells[1].innerHTML = `<strong>${nom}</strong>`;
                fila.cells[2].innerHTML = `<span class="badge bg-info text-dark">${mot}</span>`;
            }
            bootstrap.Modal.getInstance(document.getElementById('modalPaciente')).hide();
        }
    </script>
</body>
</html>
