<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recepcion - DentalSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #1e3a34; color: white; width: 260px; }
        .sidebar a { color: #d1e7dd; text-decoration: none; padding: 12px 20px; display: block; border-radius: 8px; margin: 5px 10px; cursor: pointer; }
        .sidebar a:hover, .sidebar a.active { background-color: #14a44d; color: white; }
    </style>
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar shadow p-3">
            <h4 class="text-center mb-4"><i class="fas fa-concierge-bell"></i> Recepción</h4>
            <a class="active"><i class="fas fa-tasks me-2"></i> Citas de Hoy</a>
            <a onclick="alert('Módulo de pagos habilitado')"><i class="fas fa-wallet me-2"></i> Cobros y Caja</a>
            <a href="login_dentista.html" class="text-white bg-danger mt-5"><i class="fas fa-door-open"></i> Salir</a>
        </nav>

        <div class="flex-grow-1 p-4">
            <h2 class="fw-bold text-success">Control de Recepción</h2>
            <div class="card shadow p-4 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <h5>Pacientes en espera de revisión</h5>
                    <button class="btn btn-success" onclick="alert('Abriendo formulario de admisión...')">+ Registrar Entrada</button>
                </div>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Paciente</th>
                            <th>Doctor Asignado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>08:30</td>
                            <td>Carlos Mendoza</td>
                            <td>Dra. Rojas</td>
                            <td><button class="btn btn-sm btn-info text-white">Notificar Doctora</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
